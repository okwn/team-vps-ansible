---
# Block external NIC → container traffic via DOCKER-USER chain.
# Defense-in-depth: docker-compose's `ports:` field bypasses the daemon.json
# "ip": "127.0.0.1" setting (it sends 0.0.0.0 explicitly to the Docker API),
# so the daemon-level localhost-bind is not enough on it's own.

- name: codens-docker-firewall script
  copy:
    src: codens-docker-firewall
    dest: /usr/local/bin/codens-docker-firewall
    owner: root
    group: root
    mode: "0755"
  notify: restart codens-docker-firewall

- name: codens-docker-firewall.service unit
  copy:
    src: codens-docker-firewall.service
    dest: /etc/systemd/system/codens-docker-firewall.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart codens-docker-firewall

- name: codens-docker-firewall enable + start
  systemd:
    name: codens-docker-firewall
    enabled: true
    state: started
    daemon_reload: yes
